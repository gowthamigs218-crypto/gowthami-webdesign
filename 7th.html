<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoe Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

/* Header */
header{
    background:#111;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
}

header h2{
    color:#ff9800;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

nav a:hover{
    color:#ff9800;
}

/* Hero Section */
.hero{
    height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url(nike.jpg);
    background-size:cover;
    background-position:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:50px;
}

.hero p{
    margin:20px;
    font-size:20px;
}

.hero button{
    padding:12px 25px;
    border:none;
    background:#ff9800;
    color:white;
    font-size:18px;
    cursor:pointer;
    border-radius:5px;
}

.hero button:hover{
    background:#e68900;
}

/* Products */
.products{
    padding:50px;
    text-align:center;
}

.products h2{
    margin-bottom:30px;
}

.card-container{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:260px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,.2);
    overflow:hidden;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    margin:10px;
}

.card p{
    color:#ff9800;
    font-size:20px;
    margin-bottom:10px;
}

.card button{
    margin-bottom:20px;
    padding:10px 20px;
    border:none;
    background:#111;
    color:white;
    cursor:pointer;
}

.card button:hover{
    background:#ff9800;
}

/* Footer */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>

</head>
<body>

<header>
<h2>ShoeMart</h2>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Offers</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Step Into Style</h1>
<p>Discover the latest collection of branded shoes.</p>
<button>Shop Now</button>
</section>

<section class="products">
<h2>Featured Shoes</h2>

<div class="card-container">

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500">
<h3>Running Shoes</h3>
<p>₹2,999</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1543508282-6319a3e2621f?w=500">
<h3>Sports Shoes</h3>
<p>₹3,499</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=500">
<h3>Casual Shoes</h3>
<p>₹1,999</p>
<button>Buy Now</button>
</div>
